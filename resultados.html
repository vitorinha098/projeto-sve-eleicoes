<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVE - Resultados em Tempo Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            margin-top: 50px;
            max-width: 800px;
        }
        .card-resultados {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background: white;
            padding: 40px;
        }
        .header-title {
            color: #0d6efd;
            font-weight: 800;
            text-align: center;
            margin-bottom: 10px;
        }
        .progress {
            height: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .progress-bar {
            font-weight: bold;
            line-height: 30px;
            font-size: 14px;
        }
        .candidato-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            font-weight: 600;
        }
        .btn-sair {
            margin-top: 30px;
            border-radius: 10px;
            padding: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="card-resultados">
        <h1 class="header-title">Resultados Parciais</h1>
        <p class="text-center text-muted mb-5">Dados obtidos em tempo real do servidor SVE</p>

        <div id="listaResultados">
            <div class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">A carregar...</span>
                </div>
            </div>
        </div>

        <button onclick="sair()" class="btn btn-outline-secondary w-100 btn-sair">Sair do Sistema</button>
        <p class="text-center text-muted small mt-3">Os resultados são atualizados a cada acesso.</p>
    </div>
</div>

<script>
    window.onload = async function() {
        await carregarResultados();
    };

    async function carregarResultados() {
        const container = document.getElementById('listaResultados');
        
        try {
            const response = await fetch('http://localhost:8000/resultados');
            
            if (!response.ok) throw new Error("Erro ao contactar servidor");
            
            const dados = await response.json();
            
            if (dados.length === 0) {
                container.innerHTML = "<div class='alert alert-info text-center'>Ainda não existem votos registados.</div>";
                return;
            }

            // Calcular total de votos para as percentagens
            const totalVotosGlobal = dados.reduce((sum, item) => sum + item.total_votos, 0);

            let html = "";
            dados.forEach(item => {
                // Calcular percentagem (evitar divisão por zero)
                const percentagem = totalVotosGlobal > 0 
                    ? Math.round((item.total_votos / totalVotosGlobal) * 100) 
                    : 0;

                html += `
                    <div class="resultado-item">
                        <div class="candidato-info">
                            <span>${item.nome_completo} <small class="text-muted">(${item.nome_partido})</small></span>
                            <span>${item.total_votos} votos</span>
                        </div>
                        <div class="progress">
                            <div class="progress-bar bg-primary" role="progressbar" 
                                 style="width: ${percentagem}%" 
                                 aria-valuenow="${percentagem}" aria-valuemin="0" aria-valuemax="100">
                                 ${percentagem}%
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

        } catch (error) {
            console.error("Erro:", error);
            container.innerHTML = `
                <div class='alert alert-danger text-center'>
                    Erro ao carregar dados. Verifique se o servidor está ligado.
                </div>`;
        }
    }

    function sair() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>

</body>
</html>
