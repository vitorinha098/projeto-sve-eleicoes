<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVE - Resultados em Tempo Real</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .chart-container { position: relative; height: 300px; width: 100%; }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">

<div class="container">
    <div class="row justify-content-center text-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h2 class="mb-4 text-primary fw-bold">Resultados Parciais</h2>
                <p class="text-muted mb-4">Dados obtidos em tempo real do servidor SVE</p>
                
                <div class="chart-container mb-4">
                    <canvas id="graficoVotos"></canvas>
                </div>

                <div class="d-grid gap-2">
                    <button onclick="window.location.href='login.html'" class="btn btn-outline-secondary">
                        Sair do Sistema
                    </button>
                    <small class="text-muted mt-2">Os resultados são atualizados a cada acesso.</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function carregarGrafico() {
        try {
            // 1. Pedir os dados ao Python (Base de dados em memória)
            const response = await fetch('http://127.0.0.1:8000/estatisticas');
            const dados = await response.json();

            // 2. Extrair rótulos e valores
            const labels = Object.keys(dados);
            const valores = Object.values(dados);

            // 3. Criar o Gráfico
            const ctx = document.getElementById('graficoVotos');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: valores,
                        backgroundColor: [
                            '#3b82f6', // Aliança Digital (Azul)
                            '#10b981', // União Verde (Verde)
                            '#ef4444', // Frente Social (Vermelho)
                            '#64748b'  // Branco (Cinza)
                        ],
                        hoverOffset: 10
                    }]
                },
                options: {
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    cutout: '65%'
                }
            });
        } catch (error) {
            console.error("Erro ao carregar dados:", error);
            alert("Erro ao ligar ao servidor de estatísticas!");
        }
    }

    // Executa a função assim que a página abre
    carregarGrafico();
</script>

</body>
</html>
