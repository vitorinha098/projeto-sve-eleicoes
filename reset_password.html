<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVE - Recuperar Palavra-Passe</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <style>
      :root {
        --primary: #000000;
        --accent: #3b82f6;
        --glass: rgba(255, 255, 255, 0.8);
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--primary);
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
      }

      .card-login {
        background: var(--glass);
        backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 28px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 420px;
        padding: 2.5rem;
      }

      .form-control {
        border-radius: 12px;
        padding: 12px 15px;
        border: 1px solid rgba(0, 0, 0, 0.1);
        background: rgba(255, 255, 255, 0.5);
        transition: all 0.3s;
      }

      .btn-login {
        background: var(--primary);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 20px;
        letter-spacing: 1px;
        transition: all 0.3s;
        margin-top: 1rem;
      }

      .btn-login:hover {
        background: var(--accent);
        transform: translateY(-2px);
        color: white;
      }

      .badge-secure {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 800;
        color: #64748b;
        margin-bottom: 0.5rem;
        display: inline-block;
      }
    </style>
  </head>
  <body>
    <div class="card-login text-center">
      <span class="badge-secure">
        <i class="bi-shield-lock-fill"></i> Recuperação
      </span>

      <div class="mb-4">
        <h2 class="mb-1" style="font-weight: 800; letter-spacing: -1px">
          Recuperar password
        </h2>
        <p class="small">Insira o seu e-mail e defina uma nova password.</p>
      </div>

      <form id="resetForm">
        <div class="text-start mb-3">
          <label class="form-label small fw-bold ms-1"
            >NIF (Número de Identificação Fiscal)</label
          >
          <div class="input-group">
            <span
              class="input-group-text bg-white border-end-0"
              style="border-radius: 12px 0 0 12px"
            >
              <i class="bi bi-person text-muted"></i>
            </span>
            <input
              type="text"
              class="form-control border-start-0"
              id="nifInput"
              placeholder="000 000 000"
              maxlength="9"
              required
              style="border-radius: 0 12px 12px 0"
            />
          </div>
        </div>

        <div class="text-start mb-3">
          <label class="form-label small fw-bold ms-1">
            Validade Cartão Cidadão
          </label>
          <div class="input-group">
            <input type="date" class="form-control" id="validade_cc" required />
          </div>
        </div>

        <div class="text-start mb-3">
          <label class="form-label small fw-bold ms-1 mb-1"
            >Nova Password</label
          >
          <div class="input-group">
            <span
              class="input-group-text bg-white border-end-0"
              style="border-radius: 12px 0 0 12px"
            >
              <i class="bi bi-key text-muted"></i>
            </span>
            <input
              type="password"
              class="form-control border-start-0"
              id="newPassInput"
              placeholder="••••••••"
              required
              style="border-radius: 0 12px 12px 0"
            />
          </div>
        </div>

        <div class="text-start mb-4">
          <label class="form-label small fw-bold ms-1 mb-1"
            >Confirmar nova password
          </label>
          <div class="input-group">
            <span
              class="input-group-text bg-white border-end-0"
              style="border-radius: 12px 0 0 12px"
            >
              <i class="bi bi-check2-circle text-muted"></i>
            </span>
            <input
              type="password"
              class="form-control border-start-0"
              id="confirmPassInput"
              placeholder="••••••••"
              required
              style="border-radius: 0 12px 12px 0"
            />
          </div>
        </div>

        <button
          type="button"
          onclick="recuperar()"
          class="btn btn-login w-100 shadow-sm"
        >
          Atualizar pass
        </button>
      </form>

      <div class="mt-4 pt-3 border-top">
        <a
          href="login.html"
          class="text-decoration-none small text-primary fw-bold"
          ><i class="bi bi-arrow-left"></i> Voltar ao Login</a
        >
      </div>
    </div>
  </body>

  <script>
    async function recuperar() {
    const nif = document.getElementById("nifInput").value;
    const validade_cc = document.getElementById("validade_cc").value;
    const nova_passe = document.getElementById("newPassInput").value;
    const confirmar_nova_passe = document.getElementById("confirmPassInput").value;

    if (nova_passe !== confirmar_nova_passe) {
        alert("As passwords não coincidem!");
        return;
    }

    try {
        const response = await fetch("http://localhost:8000/reset_password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                nif: nif,
                validade_cc: validade_cc,
                nova_passe: nova_passe
            }),
        });

        const data = await response.json();

        if (data.success) {
            alert("Sucesso! Já podes fazer login com a nova password.");
            window.location.href = "login.html";
        } else {
            alert(data.message || "Dados inválidos.");
        }
    } catch (error) {
        alert("Erro ao ligar ao servidor local. Verifica se o node server.js está a correr.");
    }
}
  </script>
</html>
