<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recenseamento Eleitoral - Registo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #0d6efd; /* O azul do botão do Login */
            --primary-hover: #0b5ed7; /* O azul mais escuro no hover */
            --bg-color: #f4f7f6;      /* A cor de fundo da página de Login */
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text-color);
        }

        /* Estilo do Cartão - Igual ao do Login */
        .register-card {
            background: white;
            padding: 2.5rem;
            border-radius: 10px; /* Cantos menos arredondados, mais corporativo */
            box-shadow: 0 4px 15px rgba(0,0,0,0.08); /* Sombra suave */
            width: 100%;
            max-width: 520px; /* Ligeiramente mais largo para acomodar os campos duplos */
            border-top: 5px solid var(--primary-color); /* Barra colorida no topo, comum em logins */
        }

        .card-header-title {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        /* Estilo dos Inputs - Focados e Limpos */
        .form-control {
            border-radius: 5px;
            padding: 0.75rem;
            border: 1px solid #ced4da;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.15);
        }

        .form-label {
            font-weight: 600;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 0.3rem;
        }

        /* Estilo do Botão - Cópia exata do Login */
        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            font-size: 1rem;
            border-radius: 5px;
            transition: background-color 0.2s ease;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .form-text {
            font-size: 0.8rem;
            color: #6c757d;
        }

        /* Link para voltar ao Login */
        .login-link {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }

        .login-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="text-center mb-4">
        <div class="mb-2" style="font-size: 2rem; color: var(--primary-color);">👤</div>
        <h3 class="card-header-title">Criar Conta de Eleitor</h3>
        <p class="text-muted small">Preencha os dados para o recenseamento</p>
    </div>

    <form id="formRegisto">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome Completo</label>
            <input type="text" class="form-control" id="nome" placeholder="Seu nome como no CC" required>
        </div>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label for="nif" class="form-label">NIF</label>
                <input type="text" class="form-control" id="nif" maxlength="9" pattern="\d{9}" placeholder="9 dígitos" required>
            </div>
            <div class="col-md-6 mb-3">
                <label for="nacionalidade" class="form-label">Nacionalidade</label>
                <input type="text" class="form-control" id="nacionalidade" placeholder="Ex: Portuguesa" required>
            </div>
        </div>

        <div class="mb-3">
            <label for="morada" class="form-label">Morada Completa</label>
            <input type="text" class="form-control" id="morada" placeholder="Rua, C. Postal, Cidade" required>
        </div>

        <div class="mb-4">
            <label for="chave" class="form-label">Chave de Acesso (Senha)</label>
            <input type="password" class="form-control" id="chave" placeholder="Crie uma chave segura" required>
            <div class="form-text">Esta chave será usada junto com o NIF para votar.</div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">Finalizar Registo</button>
        
        <div class="text-center small">
            <p class="text-muted">Já está recenseado? <a href="login.html" class="login-link">Faça Login</a></p>
        </div>
    </form>
</div>

<script>
    document.getElementById('formRegisto').onsubmit = async (e) => {
        e.preventDefault();

        const dados = {
            nome: document.getElementById('nome').value,
            nif: document.getElementById('nif').value,
            morada: document.getElementById('morada').value,
            nacionalidade: document.getElementById('nacionalidade').value,
            chave: document.getElementById('chave').value
        };

        try {
            const response = await fetch('http://127.0.0.1:8000/registar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            const result = await response.json();

            if (response.ok) {
                alert("✅ Registo concluído com sucesso!");
                window.location.href = 'login.html';
            } else {
                alert("❌ Erro: " + (result.message || "NIF já registado."));
            }
        } catch (error) {
            console.error("Erro ao conectar ao servidor:", error);
            alert("⚠️ Servidor offline. Ligue o Node.js!");
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
