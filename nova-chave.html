<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVE - Recuperação de Acesso</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        :root {
            --primary: #0f172a;
            --accent: #3b82f6;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
        }

        /* Fundo Animado Coerente */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            z-index: -1;
        }

        .card-recovery {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            text-align: center;
        }

        .icon-box {
            width: 60px;
            height: 60px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1.5rem;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 15px;
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .btn-send {
            background: var(--primary);
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            transition: all 0.3s;
        }

        .btn-send:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.2);
        }

        .back-link {
            color: #64748b;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>

    <div class="card-recovery">
        <div class="icon-box">
            <i class="bi bi-shield-lock"></i>
        </div>

        <h2 class="fw-extrabold mb-2" style="font-weight: 800; letter-spacing: -1px;">Esqueceu-se da Chave?</h2>
        <p class="text-muted small mb-4">Insira os seus dados oficiais para validarmos a sua identidade e enviarmos uma nova chave de acesso.</p>

        <form id="recoveryForm">
            <div class="text-start mb-3">
                <label class="form-label small fw-bold">Número de Identificação Fiscal (NIF)</label>
                <input type="text" class="form-control" id="nifRecuperar" placeholder="000 000 000" maxlength="9" required>
            </div>

            <div class="text-start mb-4">
                <label class="form-label small fw-bold">Email Associado ao CC</label>
                <input type="email" class="form-control" id="emailRecuperar" placeholder="exemplo@email.com" required>
            </div>

            <button type="button" onclick="pedirChave()" class="btn btn-send w-100 shadow-sm mb-3">
                Solicitar Nova Chave
            </button>
        </form>

        <div class="mt-3">
            <a href="login.html" class="back-link small">
                <i class="bi bi-arrow-left me-1"></i> Voltar ao Login
            </a>
        </div>
    </div>

    <script>
    async function pedirChave() {
        const nif = document.getElementById('nifRecuperar').value;
        const email = document.getElementById('emailRecuperar').value;
        const btn = document.querySelector('.btn-send');

        if(nif.length === 9 && email.includes('@')) {
            // 1. Efeito visual de carregamento
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> A enviar email...';
            btn.disabled = true;

            try {
                // 2. CHAMADA REAL AO TEU SERVIDOR PYTHON
                const response = await fetch('http://127.0.0.1:8000/recuperar', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        nif: nif,
                        email: email
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    console.log("Resposta do Servidor Python:", data);
                    // 3. SE O PYTHON RESPONDER OK
                    alert("Sucesso! O email foi enviado para a tua caixa de teste no Mailtrap.");
                    window.location.href = 'login.html';
                } else {
                    alert("Erro do Servidor: " + (data.detail || "Dados inválidos"));
                    btn.innerHTML = 'Solicitar Nova Chave';
                    btn.disabled = false;
                }

            } catch (error) {
                // 4. SE O SERVIDOR ESTIVER DESLIGADO
                alert("Erro: Não foi possível ligar ao servidor Python. Verifique se o terminal está aberto com o Uvicorn!");
                console.error("Erro de ligação:", error);
                btn.innerHTML = 'Solicitar Nova Chave';
                btn.disabled = false;
            }

        } else {
            alert("Erro: Verifique se o NIF tem 9 dígitos e o email é válido.");
        }
    }
</script>

</body>
</html>
